<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notification Sender</title>

<style>
    body{
        font-family: Arial, sans-serif;
        background:#0f172a;
        color:white;
        display:flex;
        justify-content:center;
        align-items:center;
        height:100vh;
        margin:0;
    }

    .box{
        background:#1e293b;
        padding:30px;
        border-radius:20px;
        width:320px;
        box-shadow:0 0 20px rgba(0,0,0,0.4);
    }

    h1{
        text-align:center;
        margin-bottom:20px;
    }

    input, textarea{
        width:100%;
        padding:12px;
        margin-top:10px;
        border:none;
        border-radius:10px;
        background:#334155;
        color:white;
        box-sizing:border-box;
    }

    button{
        width:100%;
        margin-top:15px;
        padding:12px;
        border:none;
        border-radius:10px;
        background:#3b82f6;
        color:white;
        font-size:16px;
        cursor:pointer;
    }

    button:hover{
        opacity:0.9;
    }
</style>
</head>
<body>

<div class="box">
    <h1>🔔 Notifications</h1>

    <input type="text" id="title" placeholder="Notification title">

    <textarea id="message" placeholder="Notification message"></textarea>

    <button onclick="requestPermission()">
        Allow Notifications
    </button>

    <button onclick="sendNotification()">
        Send Notification
    </button>
</div>

<script>
async function requestPermission() {
    const permission = await Notification.requestPermission();

    if(permission === "granted"){
        alert("Notifications enabled!");
    } else {
        alert("Permission denied.");
    }
}

function sendNotification() {

    if(Notification.permission !== "granted"){
        alert("Please allow notifications first.");
        return;
    }

    const title = document.getElementById("title").value || "Hello!";
    const message = document.getElementById("message").value || "This is a notification.";

    const notification = new Notification(title, {
        body: message,
        icon: "https://cdn-icons-png.flaticon.com/512/1827/1827392.png"
    });

    notification.onclick = () => {
        window.focus();
    };
}
</script>

</body>
</html>
