<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🤩 Happy Notifications</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Inter',sans-serif;
}

body{
    background: radial-gradient(circle at top left,#1e3a8a 0%,transparent 35%),
                radial-gradient(circle at bottom right,#7c3aed 0%,transparent 35%),
                #050816;
    color:white;
    min-height:100vh;
}

/* NAV */
.nav{
    padding:20px 40px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.logo{
    font-size:24px;
    font-weight:800;
}

.logo span{ color:#8b5cf6; }

/* LAYOUT */
.center{
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:80vh;
    padding:20px;
}

/* CARD */
.card{
    width:100%;
    max-width:520px;
    background:rgba(255,255,255,0.06);
    border:1px solid rgba(255,255,255,0.1);
    backdrop-filter:blur(18px);
    border-radius:25px;
    padding:30px;
    box-shadow:0 0 40px rgba(139,92,246,0.2);
}

h1{ font-size:32px; margin-bottom:10px; }

.sub{ color:#cbd5e1; margin-bottom:20px; }

/* INPUT */
input{
    width:100%;
    padding:14px;
    border:none;
    outline:none;
    border-radius:14px;
    background:rgba(255,255,255,0.08);
    color:white;
    margin-bottom:15px;
}

/* BUTTON */
button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:14px;
    background:linear-gradient(to right,#8b5cf6,#3b82f6);
    color:white;
    font-weight:700;
    cursor:pointer;
    margin-top:10px;
}

/* WORDS */
.words{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    margin-top:10px;
}

.word{
    padding:10px 14px;
    background:rgba(255,255,255,0.08);
    border-radius:999px;
    cursor:pointer;
    transition:0.2s;
}

.word:hover{ transform:scale(1.05); }

.word.active{
    background:#8b5cf6;
}

/* HIDDEN */
.hidden{ display:none; }

</style>
</head>

<body>

<div class="nav">
    <div class="logo">Happy<span>Notifications</span>🤩</div>
    <div>Spread kindness 🌈</div>
</div>

<!-- LOGIN SCREEN -->
<div class="center" id="loginScreen">
    <div class="card">
        <h1>Welcome 👋</h1>
        <div class="sub">Enter your username ✨</div>
        <input id="username" placeholder="Choose a username">
        <button onclick="registerUser()">Join </button>
        <div class="status" id="status"></div>
    </div>
</div>

<!-- DASHBOARD -->
<div class="center hidden" id="dashboard">
    <div class="card">
        <hr style="margin:20px 0; opacity:0.2">
        <h3 style="margin-bottom:10px;">Message History</h3>
        <div id="history" style="max-height:200px; overflow:auto; font-size:14px; color:#cbd5e1;"></div>
        <button style="background:#ef4444; margin-top:15px;" onclick="deleteAccount()">
            Delete Account
        </button>
        <h1 id="welcomeText">Hello 👋</h1>
        <div class="sub">Send positive vibes instantly 💖</div>
        <div class="words">
            <div class="word">You matter 💖</div>
            <div class="word">Stay strong 🌟</div>
            <div class="word">You got this 🚀</div>
            <div class="word">Keep smiling 😊</div>
            <div class="word">You are amazing ✨</div>
            <div class="word">Believe in yourself 🌈</div>
        </div>
        <button onclick="sendToRandom()">Send Happiness 🎁</button>
    </div>
</div>
<div id="toast" style="
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:rgba(0,0,0,0.8);
color:white;
padding:12px 18px;
border-radius:12px;
font-size:14px;
display:none;
backdrop-filter:blur(10px);
z-index:9999;
"></div>
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getDatabase, ref, set, push, get } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-database.js";

/* FIREBASE */
const firebaseConfig = {
    apiKey: "AIzaSyA_XrD0M2R-V0IvU_lrxlZ82wIp_K7QoCg",
    authDomain: "error-inc.firebaseapp.com",
    databaseURL: "https://error-inc-default-rtdb.firebaseio.com",
    projectId: "error-inc",
    storageBucket: "error-inc.firebasestorage.app",
    messagingSenderId: "876188868410",
    appId: "1:876188868410:web:795477c5dd93735f5c7a03"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

/* MESSAGE BANK (MORE HUMAN) */
const messages = [
    "Hey {user}, you're doing better than you think 💖",
    "Someone believes in you today 🌟",
    "Keep going {user}, something great is coming 🚀",
    "You matter more than you realize 💫",
    "A small step is still progress 🌈",
    "The world is better with you in it 💕",
    "You just made someone's day brighter ☀️"
];
function getUser(){
    return localStorage.getItem("glowUser");
}

function setUser(name){
    localStorage.setItem("glowUser", name);
}

/* AUTO LOGIN */
window.addEventListener("load", () => {
    const user = getUser();

    if(user){
        showDashboard(user);
        listenForMessages(user);
    }
});

/* REGISTER */
window.registerUser = async function(){

    const username = document.getElementById("username").value.trim();

    if(!username){
        toast("👀 Please enter a username first!");
        return;
    }

    const permission = await Notification.requestPermission();

    if(permission !== "granted"){
        toast("Notifications blocked.");
        return;
    }

    setUser(username);

    await set(ref(db, "users/" + username), {
        username,
        online: true,
        joined: Date.now()
    });

    toast("Connected!");

    showDashboard(username);
    listenForMessages(username);
};

/* SHOW DASHBOARD */
function showDashboard(user){
    document.getElementById("loginScreen").classList.add("hidden");
    document.getElementById("dashboard").classList.remove("hidden");

    document.getElementById("welcomeText").innerText =
        `Hey ${user} 👋`;
    loadHistory(user);
    toast("Welcome back " + user + " 👋");
}

/* SELECT WORD */
let selectedMessage = "";

document.querySelectorAll(".word").forEach(w => {
    w.addEventListener("click", () => {
        document.querySelectorAll(".word").forEach(x => x.classList.remove("active"));
        w.classList.add("active");
        selectedMessage = w.innerText;
    });
});

/* RANDOM MESSAGE */
function getRandomMessage(user){
    const msg = messages[Math.floor(Math.random() * messages.length)];
    return msg.replace("{user}", user);
}

/* SEND */
window.sendToRandom = async function(){

    const username = getUser();
    if(!username){
        toast("👀 Not logged in!");
        return;
    }

    const snapshot = await get(ref(db, "users"));

    if(!snapshot.exists()){
        toast("No users online 😢");
        return;
    }
    const users = Object.keys(snapshot.val()).filter(u => u !== username);
    if(users.length === 0){
        toast("No one else online 😢");
        return;
    }

    const randomUser = users[Math.floor(Math.random() * users.length)];

    await push(ref(db, "messages/" + randomUser), {
        from: username,
        text: selectedMessage || getRandomMessage(username),
        time: Date.now()
    });

    toast(`🎁 Sent kindness to ${randomUser} 💖`);
};

/* LISTEN */
function listenForMessages(username){

    setInterval(async () => {

        const snapshot = await get(ref(db, "messages/" + username));

        if(snapshot.exists()){
            const data = snapshot.val();

            Object.keys(data).forEach(async key => {

                const msg = data[key];

                new Notification("✨ New kindness message!", {
                    body: msg.text
                });

                await set(ref(db, "messages/" + username + "/" + key), null);
            });
        }

    }, 1500);
}
const toastEl = document.getElementById("toast");

function toast(msg){
    toastEl.innerText = msg;
    toastEl.style.display = "block";

    clearTimeout(window.__toastTimer);
    window.__toastTimer = setTimeout(() => {
        toastEl.style.display = "none";
    }, 2500);
}
async function loadHistory(username){

    const box = document.getElementById("history");

    setInterval(async () => {

        const snapshot = await get(ref(db, "messages/" + username));

        box.innerHTML = "";

        if(snapshot.exists()){
            const data = snapshot.val();

            Object.keys(data).forEach(key => {
                const msg = data[key];

                const div = document.createElement("div");
                div.style.padding = "8px";
                div.style.marginBottom = "8px";
                div.style.background = "rgba(255,255,255,0.05)";
                div.style.borderRadius = "10px";

                div.innerHTML = `
                    💌 <b>${msg.from}</b>: ${msg.text}
                `;

                box.appendChild(div);
            });
        } else {
            box.innerHTML = "No messages yet 💭";
        }

    }, 2000);
}
    window.deleteAccount = async function(){

    const user = getUser();
    if(!user) return;

    const confirmDelete = confirm("Are you sure you want to delete your account?");

    if(!confirmDelete) return;

    await set(ref(db, "users/" + user), null);
    await set(ref(db, "messages/" + user), null);

    localStorage.removeItem("glowUser");

    toast("🗑️ Account deleted");

    setTimeout(() => {
        location.reload();
    }, 1500);
};
</script>
</body>
</html>
